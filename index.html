<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="main-box">
            <div class="header">
                <i class="fas fa-user-circle"></i>
                <h1>Benvenuto!</h1>
                <p>Accedi al tuo account o registrati</p>
            </div>

            <!-- FORM DI LOGIN -->
            <div class="form-section" id="loginSection">
                <h2><i class="fas fa-sign-in-alt"></i> Accedi</h2>
                <form action="login.php" method="POST">
                    <div class="input-group">
                        <label for="login-username">
                            <i class="fas fa-user"></i>
                            <span>Username</span>
                        </label>
                        <input type="text" id="login-username" name="username" placeholder="Inserisci username" required>
                    </div>

                    <div class="input-group">
                        <label for="login-password">
                            <i class="fas fa-lock"></i>
                            <span>Password</span>
                        </label>
                        <div class="password-wrapper">
                            <input type="password" id="login-password" name="password" placeholder="Inserisci password" required>
                            <i class="fas fa-eye toggle-password" onclick="togglePassword('login-password')"></i>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" name="remember">
                            <span>Ricordami</span>
                        </label>
                        <a href="#" class="forgot-link">Password dimenticata?</a>
                    </div>

                    <button type="submit" class="btn-primary">
                        <i class="fas fa-sign-in-alt"></i>
                        Accedi
                    </button>
                </form>
                
                <div class="switch-text">
                    Non hai un account? 
                    <a href="#" onclick="showRegister()">Registrati qui</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Funzione per mostrare/nascondere password
        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            const icon = field.nextElementSibling;
            
            if (field.type === 'password') {
                field.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                field.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        };
    </script>
</body>
</html>
